version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: supplygo
      POSTGRES_PASSWORD: supplygo_password
      POSTGRES_DB: supplygo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      NODE_ENV: development
      DB_HOST: postgres
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  postgres_data:
